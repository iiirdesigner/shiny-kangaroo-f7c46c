<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>دعوات أنيقة · دخول ذكي بالباركود</title>
<meta property="og:site_name" content="دعوات أنيقة">
<meta property="og:title" content="دخول ذكي بالباركود">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="دعوات أنيقة · دخول ذكي بالباركود">

<style>
  :root { --brand:#F1E6D4; --brand2:#FFFDF9; --gold:#C69A4E; --gold-l:#8B5E3C; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }

  body {
    background: radial-gradient(1200px 800px at 50% 38%, var(--brand2), var(--brand) 62%);
    font-family: 'Tajawal', -apple-system, system-ui, sans-serif;
    display:flex; align-items:center; justify-content:center;
    min-height:100svh; padding:24px;
  }

  /* هالة ذهبية تتنفّس خلف اللوقو */
  .halo {
    position:fixed; left:50%; top:44%; width:640px; height:640px;
    transform:translate(-50%,-50%);
    background: radial-gradient(circle, rgba(198,154,78,.22), transparent 62%);
    pointer-events:none; opacity:0;
    animation: haloIn 2.2s ease-out 1.1s forwards, breathe 6s ease-in-out 3.4s infinite;
  }
  @keyframes haloIn { to { opacity:1; } }
  @keyframes breathe { 0%,100%{transform:translate(-50%,-50%) scale(1);} 50%{transform:translate(-50%,-50%) scale(1.1);} }

  .wrap { position:relative; display:flex; flex-direction:column; align-items:center; gap:52px; z-index:1; }

  .logo {
    width:140px; height:140px; position:relative;
    opacity:0; transform:scale(1.18) translateY(8px); filter:blur(12px);
    animation: logoIn 1.5s cubic-bezier(.16,1,.3,1) .25s forwards;
  }
  @keyframes logoIn { to { opacity:1; transform:scale(1) translateY(0); filter:blur(0); } }

  /* حلقات ذهبية رقيقة تتوسع خلف الحرف */
  .ring {
    position:absolute; left:50%; top:50%; border-radius:50%;
    border:1px solid rgba(198,154,78,.5);
    width:150px; height:150px;
    transform:translate(-50%,-50%) scale(.6); opacity:0;
    animation: ringOut 1.6s cubic-bezier(.2,.7,.3,1) forwards;
    pointer-events:none;
  }
  .ring.r2 { animation-delay:.95s; border-color:rgba(198,154,78,.3); }
  .ring:not(.r2) { animation-delay:.75s; }
  @keyframes ringOut {
    0% { transform:translate(-50%,-50%) scale(.6); opacity:0; }
    25% { opacity:.9; }
    100% { transform:translate(-50%,-50%) scale(2.6); opacity:0; }
  }

  /* الجملة: حروف تتقارب بين خطين ذهبيين */
  .tag {
    display:flex; align-items:center; gap:16px;
    color:#7A6248; font-size:15px; font-weight:600;
    letter-spacing:6px; opacity:0; white-space:nowrap;
    animation: tagIn 1.3s cubic-bezier(.2,.8,.2,1) 1.35s forwards;
  }
  .tag::before, .tag::after {
    content:''; height:1px; width:44px;
    background:linear-gradient(90deg, transparent, rgba(198,154,78,.65));
    transform:scaleX(0);
    animation: lineIn .9s ease 1.7s forwards;
  }
  .tag::after { background:linear-gradient(270deg, transparent, rgba(198,154,78,.65)); }
  @keyframes tagIn { to { opacity:1; letter-spacing:1.5px; } }
  @keyframes lineIn { to { transform:scaleX(1); } }
  .logo svg { width:100%; height:100%; display:block; overflow:visible; }


  /* الطبقة 2 — اللوقو المملوء يظهر بعد الرسم */
  #solid {
    fill:url(#goldGrad); stroke:none; opacity:0;
    filter: drop-shadow(0 8px 22px rgba(61,46,34,.28));
    animation: fillIn .6s ease-out .3s forwards;
  }
  @keyframes fillIn { to { opacity:1; } }

  /* الطبقة 3 — لمعة تمشي على شكل الحرف */
  #shine {
    fill:url(#shineGrad); opacity:0;
    animation: shineOn .01s linear 2.3s forwards, sweep 4.5s ease-in-out 2.3s infinite;
    mix-blend-mode: screen;
  }
  @keyframes shineOn { to { opacity:1; } }
  @keyframes sweep { 0%{transform:translateX(-130%);} 55%,100%{transform:translateX(130%);} }

  /* زر الدخول */
  .enter {
    display:inline-flex; align-items:center; gap:10px;
    background:linear-gradient(135deg, rgba(139,94,60,.92), rgba(59,39,24,.94));
    color:#F8F0E4; text-decoration:none;
    font-family:inherit; font-size:14.5px; font-weight:800; letter-spacing:.3px;
    padding:13px 40px; border-radius:100px; border:1px solid rgba(255,255,255,.3);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    box-shadow: 0 14px 32px -12px rgba(59,39,24,.5), 0 1px 0 rgba(255,255,255,.3) inset;
    opacity:0; transform:translateY(20px);
    animation: btnIn 1s cubic-bezier(.16,1,.3,1) 2.4s forwards;
    transition: transform .32s cubic-bezier(.2,.8,.2,1), box-shadow .32s ease;
    position:relative; overflow:hidden;
  }
  @keyframes btnIn { to { opacity:1; transform:translateY(0); } }
  .enter:hover  { transform:translateY(-3px); box-shadow:0 20px 42px -12px rgba(59,39,24,.6), 0 1px 0 rgba(255,255,255,.35) inset; }
  .enter:active { transform:translateY(0) scale(.96); }
  .enter svg { width:16px; height:16px; }
  /* بريق يمر على الزر */
  .enter::after {
    content:''; position:absolute; top:0; bottom:0; left:-40%; width:32%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.55), transparent);
    transform:skewX(-18deg);
    animation: btnSweep 5s ease-in-out 3.6s infinite;
  }
  @keyframes btnSweep { 0%{left:-40%;} 42%,100%{left:140%;} }

  /* الخروج عند الضغط */
  /* نقاط التحميل */
  .loader {
    display:flex; gap:9px; align-items:center; justify-content:center;
    opacity:0; animation: btnIn 1s cubic-bezier(.16,1,.3,1) 2.2s forwards;
  }
  .loader span {
    width:8px; height:8px; border-radius:50%;
    background:linear-gradient(135deg, #C69A4E, #8B5E3C);
    box-shadow:0 2px 8px rgba(139,94,60,.35);
    animation: dotPulse 1.15s ease-in-out infinite;
  }
  .loader span:nth-child(2) { animation-delay:.18s; }
  .loader span:nth-child(3) { animation-delay:.36s; }
  @keyframes dotPulse {
    0%, 100% { transform:scale(.65); opacity:.45; }
    45% { transform:scale(1); opacity:1; }
  }

  body.leaving .wrap { animation: leave .55s cubic-bezier(.7,0,.84,0) forwards; }
  body.leaving .halo { animation: leave .55s cubic-bezier(.7,0,.84,0) forwards; }
  @keyframes leave { to { opacity:0; transform:scale(1.16); filter:blur(8px); } }

  @media (max-width:480px) { .logo{width:112px;height:112px;} .wrap{gap:34px;} .tag{font-size:12.5px;gap:10px;} .tag::before,.tag::after{width:26px;} }
  @media (prefers-reduced-motion: reduce) {
    *, *::after { animation:none !important; transition:none !important; }
    #solid { opacity:1; } .logo, .tag { opacity:1; transform:none; filter:none; letter-spacing:1.5px; } .loader { opacity:1; } .halo { opacity:1; }
  }
</style>
